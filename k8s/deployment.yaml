apiVersion: apps/v1
kind: Deployment
metadata:
  name: crypto-ticker-deployment
  labels:
    app: crypto-ticker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: crypto-ticker
  template:
    metadata:
      labels:
        app: crypto-ticker
    spec:
      containers:
      - name: crypto-ticker
        image: crypto-ticker:local
        imagePullPolicy: Never  # CRITICAL: Tells K8s to use the local image just built
        ports:
        - containerPort: 8000
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"
